components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: integer
    ServiceIdParam:
      in: path
      name: serviceId
      required: true
      schema:
        type: integer
    EntryIdParam:
      in: path
      name: entryId
      required: true
      schema:
        type: integer
    CodeIdParam:
      in: path
      name: codeId
      required: true
      schema:
        type: integer
    ProfIdParam:
      in: path
      name: profId
      required: true
      schema:
        type: integer
  responses:
    Ok:
      description: Sucesso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    Created:
      description: Recurso criado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    BadRequest:
      description: Requisicao invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Nao autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Acesso negado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Recurso nao encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflito de estado
      content:
        application/json:
