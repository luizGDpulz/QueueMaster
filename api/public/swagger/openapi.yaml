openapi: 3.0.3
info:
  title: QueueMaster API
  version: 1.1.0
  description: |
    Documentacao alinhada com as rotas atualmente expostas pela API.
servers:
  - url: http://localhost
    description: XAMPP local
  - url: http://localhost:8080
    description: Servidor PHP embutido
  - url: https://api.queuemaster.com
    description: Producao
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Businesses
  - name: Invitations
  - name: Establishments
  - name: Services
  - name: Professionals
  - name: Appointments
  - name: Queues
  - name: Reports
  - name: Dashboard
  - name: Notifications
  - name: Admin
  - name: Streams
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check publico
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /api/v1/status:
    get:
      tags: [Health]
      summary: Status autenticado da API
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: Autenticar com Google OAuth
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      security: []
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/auth/me:
    get:
